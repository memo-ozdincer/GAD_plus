# @package _global_
defaults:
  - override /hydra/launcher: submitit_slurm

hydra:
  launcher:
    submitit_folder: ${hydra.sweep.dir}/.submitit/%j
    timeout_min: ${cluster.time_min}
    cpus_per_task: ${cluster.cpus_per_task}
    gpus_per_node: ${cluster.gpus_per_node}
    tasks_per_node: 1
    mem_gb: ${cluster.mem_gb}
    nodes: 1
    name: gadplus_sweep
    array_parallelism: 50
    setup:
      - module purge
      - module load StdEnv/2023 python/3.11.5 cuda/12.6
      - source /project/rrg-aspuru/memoozd/GADplus/.venv/bin/activate
      - export MLFLOW_TRACKING_URI=file:///scratch/memoozd/gadplus/mlruns
